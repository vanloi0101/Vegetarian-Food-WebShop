spring.datasource.url = jdbc:h2:mem:testdb;MODE=MYSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username = sa
spring.datasource.password = sa
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto = none

# Bắt buộc cho CustomJwtDecoder / AuthenticationService khi load full context
jwt.signerKey=0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ12
jwt.valid-duration=7200
jwt.refreshable-duration=72000

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration
